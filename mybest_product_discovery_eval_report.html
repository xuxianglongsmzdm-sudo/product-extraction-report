                { name: "兄弟工业 小型数码彩色打印机｜HL-L3220CDW", match: "Brother Industries Compact Digital Color Printer" },
                { name: "兄弟工业 商用彩色激光一体机｜MFC-L8905CDW", match: "Brother Industries Business Color Laser All-in-One" }
            ],
            missed: [],
            note: "✅ 完美匹配：Lexmark/利盟国际、Brother/兄弟工业按品牌翻译归一；型号和品类可对齐，4个跨语言条目计为命中。"
        },
        {
            title: "Best Double Boiler Sets of 2026 (Chef-Reviewed)",
            status: "perfect",
            articleLength: 23868,
            expectedCount: 10,
            extractedCount: 10,
            precision: 1,
            recall: 1,
            f1: 1,
            reason: "文章明确推荐了10款具体双锅炉套装，并给予正面评价",
            extracted: [
                { name: "Songziming Double Boiler Pot Set", match: "Songziming Double Boiler Pot Set" },
                { name: "ExcelSteel 3 Piece Boiler", match: "ExcelSteel 3 Piece Boiler" },
                { name: "Marsheepy Double Boiler Pot Set", match: "Marsheepy Double Boiler Pot Set" },
                { name: "Farberware Farberware Classic Stainless Double Boiler", match: "Farberware Farberware Classic Stainless Double Boiler" },
                { name: "Songziming Double Boiler Pot", match: "Songziming Double Boiler Pot Set" },
                { name: "Sysmie Double Boiler Pot Set for Melting Chocolate", match: "Sysmie Double Boiler Pot Set for Melting Chocolate" },
                { name: "T-fal Specialty Nonstick Double Boiler", match: "T-fal Specialty Nonstick Double Boiler" },
                { name: "Yamde 2 Piece Stainless Steel Stack and Steam Pot Set", match: "Yamde 2 Piece Stainless Steel Stack and Steam Pot Set" },
                { name: "Cook N Home 02655 Professional Double Boiler Saucepan", match: "Cook N Home 02655 Professional Double Boiler Saucepan" },
                { name: "Sysmie Norpro Stainless Universal Double Boiler", match: "Sysmie Norpro Stainless Universal Double Boiler" }
            ],
            missed: [],
            note: "✅ 完美匹配，10款双层锅/隔水锅套装均被识别。"
        }
    ];

    function escapeHtml(str) {
        if (str === undefined || str === null) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function percent(value) {
        return (value * 100).toFixed(value === 1 ? 0 : 2).replace('.00', '') + '%';
    }

    function f1Text(value) {
        return value === 1 ? '1.0000' : value.toFixed(4);
    }

    function statusIcon(status) {
        if (status === 'perfect') return '✅';
        if (status === 'partial') return '⚠️';
        return '📄';
    }

    function statusBadge(status) {
        if (status === 'perfect') return '<span class="badge-success">完美匹配</span>';
        if (status === 'partial') return '<span class="badge-warning">存在差异</span>';
        return '<span class="badge-perfect">已评估</span>';
    }

    function renderRows(article) {
        const rows = [];
        for (const item of article.extracted) {
            rows.push({
                extracted: item.name,
                expected: item.match || '—',
                status: item.match ? 'matched' : 'extra',
                note: item.match ? '✓ 匹配' : '⚠️ 误提/未匹配'
            });
        }
        for (const missed of article.missed) {
            rows.push({
                extracted: '—',
                expected: missed,
                status: 'missed',
                note: '✗ 漏掉的商品'
            });
        }
        return rows;
    }

    function renderArticles() {
        const container = document.getElementById('articles-container');
        let html = '';

        for (const article of testResults) {
            const rows = renderRows(article);
            html += `
                <div class="card article-item">
                    <div class="article-head">
                        <div class="article-title">
                            <span class="icon-em">${statusIcon(article.status)}</span>
                            <span>${escapeHtml(article.title)}</span>
                            ${statusBadge(article.status)}
                        </div>
                        <div class="metric-pills">
                            <span class="pill pill-prec">🎯 精确 ${percent(article.precision)}</span>
                            <span class="pill pill-recall">📌 召回 ${percent(article.recall)}</span>
                            <span class="pill">⚖️ F1 ${f1Text(article.f1)}</span>
                            <span class="pill pill-meta">📦 提取/预期: ${article.extractedCount}/${article.expectedCount}</span>
                        </div>
                    </div>
                    <div class="article-meta">
                        <span>文章长度：${article.articleLength.toLocaleString()} 字符</span>
                        <span>判定：is_recommendation=True / type=positive</span>
                        <span>原因：${escapeHtml(article.reason)}</span>
                    </div>
                    <div class="table-wrapper">
                        <table class="compare-table">
                            <thead>
                                <tr>
                                    <th style="width:42%">🤖 ProductDiscovery 提取结果</th>
                                    <th style="width:42%">📋 标准答案 / 匹配目标</th>
                                    <th style="width:16%">对比结论</th>
                                </tr>
                            </thead>
                            <tbody>
            `;

            for (const row of rows) {
                const isMissed = row.status === 'missed';
                const isExtra = row.status === 'extra';
                html += `
                    <tr ${isMissed ? 'style="background:#fff6f5;"' : isExtra ? 'style="background:#fffaf2;"' : ''}>
                        <td class="extract-cell">${escapeHtml(row.extracted)}</td>
                        <td class="expect-cell">${escapeHtml(row.expected)}</td>
                        <td class="align-center">
                            <span class="match-tag ${isMissed ? 'miss-tag' : isExtra ? 'extra-tag' : ''}">${isMissed ? '✗ 漏提' : isExtra ? '⚠️ 误提/未匹配' : '✓ 匹配'}</span>
                            <div class="status-note">${escapeHtml(row.note)}</div>
                        </td>
                    </tr>
                `;
            }

            html += `</tbody></table></div>`;
            if (article.warning) {
                html += `<div class="parse-note">ℹ️ ${escapeHtml(article.warning)}</div>`;
            }
            html += article.status === 'partial'
                ? `<div class="footnote-box">${escapeHtml(article.note)}</div>`
                : `<div class="success-note">${escapeHtml(article.note)}</div>`;
            html += `</div>`;
        }

        container.innerHTML = html;
    }

    renderArticles();
</script>
</body>
</html>
