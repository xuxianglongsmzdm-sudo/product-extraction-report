        },
        {

            status: "perfect",

        },
        {

            extractedCount: 1, expectedCount: 1,
            extracted: ["jordanian zest bundle"],
            expected: ["jordanian zest bundle"],
            matchMap: {
                "jordanian zest bundle": "jordanian zest bundle"
            },

        },
        {
            title: "sofra bundle",
            status: "perfect",

            expected: ["sofra bundle"],

            },
            extra: [], missed: [],
            note: "✅ 完美匹配"
        },
        {
            // vivo 文章：修正模糊匹配
            // 模型输出 "斯莫格FilMov手机影像套装 For vivo X100Pro标准版" 匹配预期 "斯莫格FilMov手机影像套装"
            title: "让vivo X100Pro影像更强大，斯莫格FilMov手机影像套装体验",
            status: "perfect",
            precision: 1.0, recall: 1.0, f1: 1.0,
            extractedCount: 2, expectedCount: 2,
            extracted: ["斯莫格FilMov手机影像套装 For vivo X100Pro标准版", "vivo X100Pro"],
            expected: ["vivo X100Pro", "斯莫格FilMov手机影像套装"],
            matchMap: {

                "斯莫格FilMov手机影像套装 For vivo X100Pro标准版": "斯莫格FilMov手机影像套装"
            },
            extra: [],
            missed: [],
            note: "✅ 修正后完美匹配：名称包含关系（套装名称含型号后缀）被识别为匹配"
        }
    ];

    function escapeHtml(str) {
        if (str === undefined || str === null) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function getStatusIcon(status) {
        if (status === 'perfect') return '✅';
        if (status === 'precision_issue') return '⚠️';
        if (status === 'recall_issue') return '⚠️';
        if (status === 'empty_correct') return '📭';
        return '❓';
    }

    function getStatusBadge(status) {
        if (status === 'perfect') return '<span class="badge-success" style="font-size:0.65rem;">完美匹配 ✓</span>';
        if (status === 'precision_issue') return '<span class="badge-warning" style="background:#fff0e0; padding:2px 12px; border-radius:20px; font-size:0.65rem;">精确率受损 ⚠️</span>';
        if (status === 'recall_issue') return '<span class="badge-warning" style="background:#ffe4e2; padding:2px 12px; border-radius:20px; font-size:0.65rem;">召回率受损 ⚠️</span>';
        if (status === 'empty_correct') return '<span class="badge-perfect" style="padding:2px 12px; border-radius:20px; font-size:0.65rem;">正确拒绝 ✓</span>';
        return '';
    }

    function buildAlignedRows(article) {
        const rows = [];
        const matchMap = article.matchMap || {};
        
        // 先处理预期商品（包括漏提的）
        for (let i = 0; i < article.expected.length; i++) {
            const exp = article.expected[i];
            // 查找匹配的提取结果
            let matchedExtract = null;
            for (const [extract, matchedExp] of Object.entries(matchMap)) {
                if (matchedExp === exp) {
                    matchedExtract = extract;
                    break;
                }
            }
            
            rows.push({
                expected: exp,
                extractedValue: matchedExtract || '—',
                status: matchedExtract ? 'matched' : 'missed',
                note: matchedExtract ? '✅ 匹配' : '❌ 漏提取'
            });
        }
        
        // 处理误提取（extra）：出现在提取中但不在任何匹配中的
        const matchedExtracts = new Set(Object.keys(matchMap));
        if (article.extra && article.extra.length > 0) {
            for (let ext of article.extra) {
                rows.push({
                    expected: '—',
                    extractedValue: ext,
                    status: 'extra',
                    note: '⚠️ 误提取（不应提取）'
                });
            }
        }
        
        return rows;
    }

    function renderArticles() {
        const container = document.getElementById('articles-container');
        if (!container) return;
        let html = '';
        
        for (let idx = 0; idx < testResults.length; idx++) {
            const art = testResults[idx];
            const precisionPercent = art.precision !== null ? (art.precision * 100).toFixed(0) : 'N/A';
            const recallPercent = art.recall !== null ? (art.recall * 100).toFixed(0) : 'N/A';
            const f1Value = art.f1 !== null ? art.f1.toFixed(4) : 'N/A';
            const statusIcon = getStatusIcon(art.status);
            const statusBadge = getStatusBadge(art.status);
            const rows = buildAlignedRows(art);
            
            html += `
                <div class="card article-item">
                    <div class="article-head">
                        <div class="article-title">
                            <span class="icon-em">${statusIcon}</span>
                            <span>${escapeHtml(art.title)}</span>
                            ${statusBadge}
                        </div>
                        <div class="metric-pills">
                            ${art.precision !== null ? `<span class="pill pill-prec">🎯 精确 ${precisionPercent}%</span>` : ''}
                            ${art.recall !== null ? `<span class="pill pill-recall">📌 召回 ${recallPercent}%</span>` : ''}
                            ${art.f1 !== null ? `<span class="pill">⚖️ F1 ${f1Value}</span>` : ''}
                            <span class="pill">📦 ${art.extractedCount}/${art.expectedCount}</span>
                        </div>
                    </div>
                    <div class="table-wrapper">
                        <table class="compare-table">
                            <thead>
                                <tr>
                                    <th style="width:42%">🤖 LLM 提取结果</th>
                                    <th style="width:42%">📋 实际期望</th>
                                    <th style="width:16%">对比结论</th>
                                </tr>
                            </thead>
                            <tbody>
            `;
            
            for (let row of rows) {
                let statusHtml = '';
                let rowBg = '';
                if (row.status === 'matched') {
                    statusHtml = `<span class="match-tag">✓ 匹配</span>`;
                } else if (row.status === 'missed') {
                    statusHtml = `<span class="match-tag miss-tag">✗ 漏提</span>`;
                    rowBg = 'style="background:#fff6f5;"';
                } else if (row.status === 'extra') {
                    statusHtml = `<span class="match-tag extra-tag">⚠️ 误提取</span>`;
                    rowBg = 'style="background:#fffaf2;"';
                }
                html += `<tr ${rowBg}>
                    <td class="extract-cell">${escapeHtml(row.extractedValue)}</td>
                    <td class="expect-cell">${escapeHtml(row.expected)}</td>
                    <td class="align-center">${statusHtml}<div class="status-note">${escapeHtml(row.note)}</div></td>
                </tr>`;
            }
            
            html += `</tbody>
                        </table>
                    </div>`;
            
            if (art.note && art.note.includes('⚠️')) {
                html += `<div class="footnote-box">📌 ${escapeHtml(art.note)}</div>`;
            } else if (art.note && art.note.includes('✅')) {
                html += `<div class="fix-note">${escapeHtml(art.note)}</div>`;
            } else if (art.status === 'empty_correct') {
                html += `<div class="fix-note" style="background:#f0f4fa; color:#5b6e8c; border-left-color:#94a3b8;">📭 ${escapeHtml(art.note)}</div>`;
            }
            html += `</div>`;
        }
        container.innerHTML = html;
    }

    renderArticles();
</script>
